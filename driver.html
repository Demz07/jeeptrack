<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a73e8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon.png">
  <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <title>JeepTrack — Driver</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="app-shell">
    <!-- Header -->
    <header class="app-header">
      <div class="brand">
        <div class="logo">JT</div>
        <span>JeepTrack</span>
      </div>
      <div class="header-actions">
        <button class="header-badge" id="passenger-badge">
          <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="8" cy="7" r="4"/><circle cx="18" cy="8" r="3"/><path d="M23 21v-2a3 3 0 00-3-3"/></svg>
          <span id="badge-text">0 nearby</span>
        </button>
      </div>
    </header>

    <!-- Content -->
    <div class="app-content" id="app-content">
      <!-- Status -->
      <div class="card">
        <div class="status-bar">
          <span class="status-dot" id="status-dot"></span>
          <div>
            <div class="status-text" id="status-text">Initializing...</div>
            <div class="status-sub" id="status-sub"></div>
          </div>
        </div>
      </div>

      <!-- Plate & Vehicle -->
      <div class="card plate-card">
        <div class="plate-display">
          <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="12" rx="2"/><circle cx="7" cy="17" r="2" fill="currentColor"/><circle cx="17" cy="17" r="2" fill="currentColor"/><line x1="3" y1="11" x2="21" y2="11"/></svg>
          <span class="plate-number" id="plate-number">—</span>
        </div>
        <button class="btn btn-sm btn-ghost" id="btn-plate-edit">Edit</button>
      </div>

      <!-- Route -->
      <div class="card">
        <div class="card-title">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><path d="M9 9l6 6"/></svg>
          Route
        </div>
        <div class="route-form">
          <div class="route-row">
            <span class="route-dot"></span>
            <input class="input-field" type="text" id="input-origin" placeholder="Origin" maxlength="50" autocomplete="off">
          </div>
          <div class="route-row">
            <span class="route-dot dest"></span>
            <input class="input-field" type="text" id="input-dest" placeholder="Destination" maxlength="50" autocomplete="off">
          </div>
        </div>
        <button class="btn btn-sm btn-secondary route-save" id="btn-save-route">
          <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Save Route
        </button>
        <div class="route-status" id="route-status"></div>
      </div>

      <!-- GPS Data -->
      <div class="card">
        <div class="card-title">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 0110 10"/><path d="M12 6a6 6 0 016 6"/><circle cx="12" cy="12" r="2"/></svg>
          GPS Signal
        </div>
        <div class="gps-grid">
          <div class="gps-item">
            <div class="label">Latitude</div>
            <div class="value" id="gps-lat">—</div>
          </div>
          <div class="gps-item">
            <div class="label">Longitude</div>
            <div class="value" id="gps-lng">—</div>
          </div>
          <div class="gps-item">
            <div class="label">Speed</div>
            <div class="value" id="gps-speed">0 km/h</div>
          </div>
          <div class="gps-item">
            <div class="label">Accuracy</div>
            <div class="value" id="gps-accuracy">—</div>
          </div>
        </div>
      </div>

      <!-- Live Map -->
      <div class="card map-card" id="live-map-card" style="display:none;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;">
          <span class="card-title" style="margin:0;">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
            Live Position
          </span>
        </div>
        <div class="map-container" id="driver-live-map"></div>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="app-bottom">
      <div class="bottom-row">
        <button class="btn-toggle start" id="btn-toggle" disabled>Start Tracking</button>
        <button class="btn btn-sm btn-ghost" id="btn-exit" title="Exit">Exit</button>
      </div>
    </div>
  </div>

  <!-- Plate Modal -->
  <div class="modal-overlay" id="modal-plate">
    <div class="modal-box">
      <div class="modal-title">Vehicle Plate Number</div>
      <p style="font-size:14px;color:var(--text-secondary);margin-bottom:16px;">
        Enter your jeepney's plate number so passengers can identify you on the map.
      </p>
      <input class="input-field" type="text" id="input-plate" placeholder="e.g. ABC-123" maxlength="15" autocomplete="off">
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="document.getElementById('modal-plate').classList.remove('open')">Cancel</button>
        <button class="btn btn-primary" id="btn-plate-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Passenger Overlay -->
  <div class="overlay-full" id="passenger-overlay">
    <div class="overlay-header">
      <h2>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="8" cy="7" r="4"/><circle cx="18" cy="8" r="3"/><path d="M23 21v-2a3 3 0 00-3-3"/></svg>
        Passengers <span id="overlay-count">(0)</span>
      </h2>
      <button class="btn btn-icon btn-ghost" id="btn-overlay-close">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="overlay-map" id="passenger-map"></div>
  </div>

  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
  </script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/driver.js"></script>
</body>
</html>
