<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a73e8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon.png">
  <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>JeepTrack</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="app-shell">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;">
      <div style="width:72px;height:72px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;">
        <span style="color:#fff;font-size:32px;font-weight:800;">JT</span>
      </div>
      <h1 style="font-size:28px;font-weight:800;margin-bottom:4px;">JeepTrack</h1>
      <p style="font-size:16px;color:var(--text-secondary);margin-bottom:32px;">Real-time Jeepney GPS Tracking</p>

      <div style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;">
        <button id="btn-driver" class="btn btn-primary" style="padding:16px;font-size:16px;border-radius:12px;gap:10px;">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="12" rx="2"/><circle cx="7" cy="17" r="2" fill="currentColor"/><circle cx="17" cy="17" r="2" fill="currentColor"/><line x1="3" y1="11" x2="21" y2="11"/></svg>
          I'm a Driver
        </button>
        <button id="btn-passenger" class="btn btn-success" style="padding:16px;font-size:16px;border-radius:12px;gap:10px;">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="8" cy="7" r="4"/><circle cx="18" cy="8" r="3"/><path d="M23 21v-2a3 3 0 00-3-3"/></svg>
          I'm a Passenger
        </button>
      </div>

      <p style="margin-top:32px;font-size:13px;color:var(--text-tertiary);">Select your role to get started</p>
    </div>
  </div>
  <script>
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
